# .github/workflows/deploy.yml
name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: TELEGRAM_BOT_TOKEN
          script: |
            set -e
            cd ~/garden/backend

            # Pull the latest code
            if [ ! -d .git ]; then
              git clone git@github.com:${{ github.repository }}.git .
            else
              git pull origin main
            fi

            # ── Inject secrets into .env ──
            # Update TELEGRAM_BOT_TOKEN from GitHub Secrets
            if grep -q "^TELEGRAM_BOT_TOKEN=" .env 2>/dev/null; then
              sed -i "s|^TELEGRAM_BOT_TOKEN=.*|TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}|" .env
            else
              echo "TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}" >> .env
            fi

            # ── Backend ──
            docker build -t garden-api:latest .
            docker compose up -d api

            # ── Frontend ──
            cd frontend
            npm ci
            npm run build
            rm -rf /var/www/garden/*
            cp -r dist/* /var/www/garden/

            # ── Healthcheck ──
            echo "Waiting for API..."
            sleep 5
            curl -sf http://localhost:3000/health || echo "⚠️  Healthcheck failed"
            echo "✅ Deploy complete"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
