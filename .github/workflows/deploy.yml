name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/garden/backend

            # First run: clone the repo; afterwards: pull the latest changes
            if [ ! -d .git ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git pull origin main
            fi

            # Build the image
            docker build -t garden-api:latest .

            # Restart only the api service (the database is left untouched)
            docker compose up -d api

            # Wait for the healthcheck
            echo "Waiting for healthcheck..."
            sleep 5
            curl -sf http://localhost:3000/health || echo "⚠️  Healthcheck failed"